<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dövme Oyunu</title>
<style>
    body {
        margin: 0;
        background-color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        color: black;
        font-size: 18px;
        z-index: 10;
    }

    #container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        position: relative;
    }

    img {
        width: 250px;
        height: 250px;
        object-fit: cover; /* oran bozulmaz */
        border-radius: 15px;
        cursor: pointer;
    }

    .hit {
        animation: shake 0.3s;
    }

    @keyframes shake {
        0% { transform: translate(0px, 0px) rotate(0deg); }
        25% { transform: translate(-6px, 6px) rotate(-6deg); }
        50% { transform: translate(6px, -6px) rotate(6deg); }
        75% { transform: translate(-6px, 6px) rotate(-6deg); }
        100% { transform: translate(0px, 0px) rotate(0deg); }
    }

    #flash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: red;
        opacity: 0;
        pointer-events: none;
    }

    .flash-active {
        animation: flashAnim 0.3s;
    }

    @keyframes flashAnim {
        0% { opacity: 0.4; }
        100% { opacity: 0; }
    }

    .sorry {
        position: absolute;
        color: black;
        font-weight: bold;
        pointer-events: none;
        animation: fadeUp 1s forwards;
    }

    @keyframes fadeUp {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-30px); }
    }
</style>
</head>
<body>

<div id="flash"></div>

<div id="ui">
    <div id="score">Skor: 0</div>
    <div id="health">Can: 10</div>
    <div id="combo">Combo: 0</div>
</div>

<div id="container">
    <!-- BURASI DEĞİŞTİ -->
    <img id="photo" src="gorsel.jpg">
</div>

<audio id="hitSound" src="https://www.soundjay.com/human/slap-01.mp3"></audio>

<script>
    const photo = document.getElementById("photo");
    const scoreText = document.getElementById("score");
    const healthText = document.getElementById("health");
    const comboText = document.getElementById("combo");
    const flash = document.getElementById("flash");
    const hitSound = document.getElementById("hitSound");

    let score = 0;
    let health = 10;
    let combo = 0;
    let lastClick = 0;

    photo.addEventListener("click", () => {

        const now = Date.now();

        if (now - lastClick < 1000) {
            combo++;
        } else {
            combo = 1;
        }
        lastClick = now;

        if (navigator.vibrate) {
            navigator.vibrate(100);
        }

        hitSound.currentTime = 0;
        hitSound.play();

        flash.classList.add("flash-active");
        setTimeout(() => flash.classList.remove("flash-active"), 300);

        score += combo;
        health--;

        scoreText.innerText = "Skor: " + score;
        healthText.innerText = "Can: " + health;
        comboText.innerText = "Combo: " + combo;

        photo.classList.add("hit");
        setTimeout(() => photo.classList.remove("hit"), 300);

        // rastgele yazı
        const rect = photo.getBoundingClientRect();
        const text = document.createElement("div");
        text.className = "sorry";
        text.innerText = "😢 Özür dilerim!";

        const x = rect.left + Math.random() * rect.width;
        const y = rect.top + Math.random() * rect.height;

        text.style.left = x + "px";
        text.style.top = y + "px";

        document.body.appendChild(text);
        setTimeout(() => text.remove(), 1000);

        if (health <= 0) {
            setTimeout(() => {
                alert("Oyun bitti! Skor: " + score);
                score = 0;
                health = 10;
                combo = 0;

                scoreText.innerText = "Skor: 0";
                healthText.innerText = "Can: 10";
                comboText.innerText = "Combo: 0";
            }, 300);
        }
    });
</script>

</body>
</html>
