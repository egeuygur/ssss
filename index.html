<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yumruk Oyunu</title>

<style>
    body {
        margin: 0;
        background: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        color: black;
        font-size: 18px;
        z-index: 1000;
    }

    #container {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    img {
        width: 800px;
        height: 800px;
        object-fit: cover;
        border-radius: 20px;
        cursor: pointer;
    }

    .hit {
        animation: shake 0.25s;
    }

    @keyframes shake {
        0% { transform: translate(0,0); }
        25% { transform: translate(-8px, 8px); }
        50% { transform: translate(8px, -8px); }
        75% { transform: translate(-8px, 8px); }
        100% { transform: translate(0,0); }
    }

    #flash {
        position: fixed;
        inset: 0;
        background: red;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
    }

    .flash-active {
        animation: flash 0.25s;
    }

    @keyframes flash {
        0% { opacity: 0.4; }
        100% { opacity: 0; }
    }

    /* ÖZÜR YAZISI */
    .sorry {
        position: fixed;
        color: black;
        font-weight: bold;
        pointer-events: none;
        animation: up 1s forwards;
        z-index: 999;
    }

    @keyframes up {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-40px); }
    }

    /* YUMRUK (1.8x büyütülmüş) */
    .punch {
        position: fixed;
        width: 216px;
        height: 216px;
        background: url("yumruk.png") no-repeat center/contain;
        z-index: 999;
        pointer-events: none;
        animation: punchAnim 0.25s forwards;
    }

    @keyframes punchAnim {
        0% { transform: scale(0.5); opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; }
    }

</style>
</head>
<body>

<div id="flash"></div>

<div id="ui">
    <div id="score">Skor: 0</div>
    <div id="health">Can: 10</div>
    <div id="combo">Combo: 0</div>
</div>

<div id="container">
    <img id="photo" src="gorsel.jpg">
</div>

<audio id="hitSound" src="https://www.soundjay.com/human/slap-01.mp3"></audio>

<script>

const photo = document.getElementById("photo");
const flash = document.getElementById("flash");
const hitSound = document.getElementById("hitSound");

const scoreText = document.getElementById("score");
const healthText = document.getElementById("health");
const comboText = document.getElementById("combo");

let score = 0;
let health = 10;
let combo = 0;
let lastClick = 0;

/* 🔥 MERKEZ YUMRUK SPAWN */
function spawnPunch() {
    const punch = document.createElement("div");
    punch.className = "punch";

    const rect = photo.getBoundingClientRect();

    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const offsetX = (Math.random() - 0.5) * 80;
    const offsetY = (Math.random() - 0.5) * 80;

    punch.style.left = (centerX + offsetX - 108) + "px";
    punch.style.top = (centerY + offsetY - 108) + "px";

    document.body.appendChild(punch);

    setTimeout(() => punch.remove(), 250);
}

/* CLICK */
photo.addEventListener("click", () => {

    const now = Date.now();

    if (now - lastClick < 1000) combo++;
    else combo = 1;

    lastClick = now;

    if (navigator.vibrate) navigator.vibrate(80);

    hitSound.currentTime = 0;
    hitSound.play();

    flash.classList.add("flash-active");
    setTimeout(() => flash.classList.remove("flash-active"), 250);

    score += combo;
    health--;

    scoreText.innerText = "Skor: " + score;
    healthText.innerText = "Can: " + health;
    comboText.innerText = "Combo: " + combo;

    photo.classList.add("hit");
    setTimeout(() => photo.classList.remove("hit"), 250);

    spawnPunch();

    const rect = photo.getBoundingClientRect();
    const text = document.createElement("div");
    text.className = "sorry";
    text.innerText = "😢 Özür dilerim!";

    text.style.left = rect.left + Math.random() * rect.width + "px";
    text.style.top = rect.top + Math.random() * rect.height + "px";

    document.body.appendChild(text);
    setTimeout(() => text.remove(), 900);

    if (health <= 0) {
        setTimeout(() => {
            alert("Oyun bitti! Skor: " + score);

            score = 0;
            health = 10;
            combo = 0;

            scoreText.innerText = "Skor: 0";
            healthText.innerText = "Can: 10";
            comboText.innerText = "Combo: 0";
        }, 200);
    }
});

</script>

</body>
</html>
